<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | MyHomeMistri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg">
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo">
            <i class="fa-solid fa-screwdriver-wrench"></i> MyHome<span class="text-teal">Mistri</span>
        </div>
        <button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Find Pros</a>
            <a href="#" class="active">Account</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div id="userLoginView" class="glass-panel auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to manage your bookings</p>
            <form id="userLoginForm">
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label for="userPassword">Password</label>
                    <input type="password" id="userPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
                    New here? <a href="#" id="showRegisterBtn" style="color: var(--teal-primary);">Create account</a>
                </p>
            </form>
        </div>

        <div id="userRegisterView" class="glass-panel auth-card hidden">
            <h2>Create Account</h2>
            <p class="subtitle">Join MyHomeMistri today</p>
            <form id="userRegisterForm">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
                <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
                    Already have an account? <a href="#" id="showLoginBtn" style="color: var(--teal-primary);">Sign In</a>
                </p>
            </form>
        </div>

        <!-- Updated Dashboard Layout -->
        <div id="userDashboardView" class="glass-panel dashboard-wide hidden">
            <!-- Content injected by JS -->
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
